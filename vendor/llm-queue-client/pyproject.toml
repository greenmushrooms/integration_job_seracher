[project]
name = "llm-queue"
version = "0.1.0"
description = "Python client for the llm-queue async LLM task queue"
requires-python = ">=3.11"
dependencies = [
    "psycopg2-binary>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["llm_queue"]
